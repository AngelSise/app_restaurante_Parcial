<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Restaurante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 380px;">
    <h3 class="text-center mb-4">🍽️ Restaurante</h3>
    <div id="mensaje" class="alert d-none"></div>
    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input type="text" id="usuario" class="form-control" placeholder="Ingresa tu usuario">
    </div>
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña">
    </div>
    <button onclick="login()" class="btn btn-danger w-100">Ingresar</button>
    <br>
    <button onclick="login()" class="btn btn-danger w-100">Registrar</button>
    
  </div>

  <script>
    function login() {
      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;
      const mensaje = document.getElementById('mensaje');

      if (usuario === 'admin' && password === '1234') {
        mensaje.className = 'alert alert-success';
        mensaje.textContent = '✅ Bienvenido, ' + usuario + '!';
      } else {
        mensaje.className = 'alert alert-danger';
        mensaje.textContent = '❌ Usuario o contraseña incorrectos';
      }
      mensaje.classList.remove('d-none');
    }
  </script>
</body>
</html>
